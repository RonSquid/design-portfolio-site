<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PORTFOLIO</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
.nav-link {
  position: relative;
}

.nav-link::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: currentColor;
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}
</style>

</head>

<body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-white">

<!-- ✅ SAME NAV AS INDEX -->
<div id="nav-placeholder"></div>

<!-- HERO -->
<div id="hero-placeholder"></div>


<!-- PORTFOLIO -->
<section class="max-w-7xl mx-auto px-6 py-16">

<h1 class="text-4xl font-bold mb-10">Portfolio</h1>

<div class="flex gap-6 mb-10">

<button onclick="filterProjects('all')">All</button>
<button onclick="filterProjects('branding')">Branding</button>
<button onclick="filterProjects('web')">Web</button>
<button onclick="filterProjects('print')">Print</button>

</div>

<div class="grid md:grid-cols-3 gap-8">

<div class="project branding group">
<img src="https://picsum.photos/600/500" class="rounded-lg group-hover:scale-105 transition">
</div>

<div class="project web group">
<img src="https://picsum.photos/600/501" class="rounded-lg group-hover:scale-105 transition">
</div>

<div class="project print group">
<img src="https://picsum.photos/600/502" class="rounded-lg group-hover:scale-105 transition">
</div>

</div>

</section>

<script src="/assets/js/script.js"></script>

</body>
</html>
