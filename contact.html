<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
.nav-link {
  position: relative;
}

.nav-link::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: currentColor;
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}
</style>

</head>

<body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-white">

<!-- ✅ SAME NAV AS INDEX -->
<div id="nav-placeholder"></div>

<!-- HERO -->
<div id="hero-placeholder"></div>

<!-- CONTACT FORM -->
<section class="max-w-3xl mx-auto px-6 py-20">

<h1 class="text-4xl font-bold mb-10">Contact</h1>

<form 
name="contact"
method="POST"
data-netlify="true"
action="/success.html"
class="space-y-6"
>

<input type="hidden" name="form-name" value="contact">

<!-- NAME -->
<div>
<label class="block mb-2 font-medium">Name</label>
<input
type="text"
name="name"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>
</div>

<!-- EMAIL -->
<div>
<label class="block mb-2 font-medium">Email</label>
<input
type="email"
name="email"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>
</div>

<!-- MESSAGE -->
<div>
<label class="block mb-2 font-medium">Message</label>
<textarea
name="message"
rows="5"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
></textarea>
</div>

<!-- BUTTON -->
<button
type="submit"
class="bg-lime-500 hover:bg-lime-600 text-white font-semibold px-8 py-4 rounded-lg transition">
Send Message
</button>

</form>

</section>

<script src="/assets/js/script.js"></script>

</body>
</html>
