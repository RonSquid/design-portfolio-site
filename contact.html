<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
.nav-link {
  position: relative;
}

.nav-link::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background: currentColor;
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}
</style>

</head>

<body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-white">

<!-- ✅ SAME NAV AS INDEX -->
<header class="sticky top-0 z-50 backdrop-blur bg-white/70 dark:bg-gray-900/70 border-b border-gray-200 dark:border-gray-800">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<a href="index.html" class="text-xl font-bold tracking-tight">
Ron Leighton
</a>

<nav class="hidden md:flex items-center space-x-8 text-sm font-medium">

<a href="index.html" class="nav-link hover:text-gray-500">Home</a>
<a href="portfolio.html" class="nav-link hover:text-gray-500">Portfolio</a>
<a href="about.html" class="nav-link hover:text-gray-500">About</a>
<a href="contact.html" class="nav-link hover:text-gray-500">Contact</a>

<button id="darkToggle" class="ml-4 text-lg hover:scale-110 transition">
🌙
</button>

</nav>

<button id="menuToggle" class="md:hidden text-2xl">
☰
</button>

</div>

<div id="mobileMenu" class="hidden px-6 pb-6 md:hidden">
<div class="flex flex-col space-y-4 text-lg">

<a href="index.html" class="nav-link">Home</a>
<a href="portfolio.html" class="nav-link">Portfolio</a>
<a href="about.html" class="nav-link">About</a>
<a href="contact.html" class="nav-link font-semibold">Contact</a>

<button id="darkToggleMobile">Toggle Dark Mode</button>

</div>
</div>

</header>

<!-- CONTACT FORM -->
<section class="max-w-3xl mx-auto px-6 py-20">

<h1 class="text-4xl font-bold mb-10">Contact</h1>

<form 
name="contact"
method="POST"
data-netlify="true"
action="/success.html"
class="space-y-6"
>

<input type="hidden" name="form-name" value="contact">

<!-- NAME -->
<div>
<label class="block mb-2 font-medium">Name</label>
<input
type="text"
name="name"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>
</div>

<!-- EMAIL -->
<div>
<label class="block mb-2 font-medium">Email</label>
<input
type="email"
name="email"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>
</div>

<!-- MESSAGE -->
<div>
<label class="block mb-2 font-medium">Message</label>
<textarea
name="message"
rows="5"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
></textarea>
</div>

<!-- BUTTON -->
<button
type="submit"
class="bg-lime-500 hover:bg-lime-600 text-white font-semibold px-8 py-4 rounded-lg transition">
Send Message
</button>

</form>

</section>

<script src="/assets/js/script.js"></script>

</body>
</html>
