<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->

<header class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">

<h1 class="text-xl font-bold">h1 nheader</h1>

<nav class="space-x-6">
<a href="index.html" class="hover:text-gray-500">Home</a>
<a href="portfolio.html" class="hover:text-gray-500">Portfolio</a>
<a href="about.html" class="hover:text-gray-500">About</a>
<a href="contact.html" class="hover:text-gray-500">Contact</a>

<button id="darkToggle" class="ml-4">🌙</button>
</nav>

</header>


<!-- CONTACT FORM -->

<section class="max-w-3xl mx-auto px-6 py-20">

<h1 class="text-4xl font-bold mb-10">Contact</h1>

<form 
name="contact"
method="POST"
data-netlify="true"
class="space-y-6"
action="/success.html"
>

<input type="hidden" name="form-name" value="contact">


<!-- NAME -->

<div>

<label class="block mb-2 font-medium">
Name
</label>

<input
type="text"
name="name"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>

</div>


<!-- EMAIL -->

<div>

<label class="block mb-2 font-medium">
Email
</label>

<input
type="email"
name="email"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
/>

</div>


<!-- MESSAGE -->

<div>

<label class="block mb-2 font-medium">
Message
</label>

<textarea
name="message"
rows="5"
required
class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-lime-500"
></textarea>

</div>


<!-- SUBMIT -->

<button
type="submit"
class="bg-lime-500 hover:bg-lime-600 text-white font-semibold px-8 py-4 rounded-lg transition">

Send Message

</button>

</form>

</section>

<script src="assets/js/script.js"></script>

</body>
</html>
